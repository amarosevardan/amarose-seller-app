
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMAROSE Seller App</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #101828;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
    }
    .topbar {
      background: #175cd3;
      color: #fff;
      padding: 18px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .brand {
      font-size: 17px;
      font-weight: 800;
    }
    .lang {
      width: 150px;
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .status {
      margin: 16px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #fedf89;
      background: #fffaeb;
      color: #b54708;
      font-size: 14px;
      min-height: 48px;
    }
    .content {
      padding: 16px;
    }
    .box {
      background: #fff;
      border: 1px solid #d0d5dd;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 20px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 800;
    }
    .label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #344054;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      font-size: 16px;
      margin-bottom: 12px;
      background: #fff;
      color: #101828;
    }
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .primary { background: #175cd3; color: #fff; }
    .secondary { background: #e8eefc; color: #175cd3; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand" id="brand">AMAROSE Seller App</div>
      <select id="langSelect" class="lang">
        <option value="en">English</option>
        <option value="ru">Русский</option>
      </select>
    </div>

    <div id="status" class="status"></div>

    <div id="authView" class="content">
      <h1 id="loginTitle">Seller Login</h1>

      <div class="box">
        <label class="label" id="emailLabel">Email</label>
        <input id="email" type="email" placeholder="seller@amarose.com">

        <label class="label" id="passwordLabel">Password</label>
        <input id="password" type="password" placeholder="Enter password">

        <button id="loginBtn" class="primary">Login</button>
        <button id="createBtn" class="secondary">Create account</button>
        <button id="resetBtn" class="secondary">Reset password</button>
      </div>

      <div class="box">
        <h2 id="demoTitle">Demo access</h2>
        <div id="demoText">You can login with any email and any password. Data is saved in this browser.</div>
      </div>
    </div>

    <div id="appView" class="content hidden">
      <div class="box">
        <h2 id="welcomeTitle">Welcome</h2>
        <div id="welcomeText"></div>
      </div>

      <div class="box">
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "amarose_simple_lang_app_v1";

    const T = {
      en: {
        brand: "AMAROSE Seller App",
        loginTitle: "Seller Login",
        emailLabel: "Email",
        passwordLabel: "Password",
        emailPlaceholder: "seller@amarose.com",
        passwordPlaceholder: "Enter password",
        loginBtn: "Login",
        createBtn: "Create account",
        resetBtn: "Reset password",
        demoTitle: "Demo access",
        demoText: "You can login with any email and any password. Data is saved in this browser.",
        welcomeTitle: "Welcome",
        welcomeText: "You are logged in.",
        logoutBtn: "Logout",
        statusLoaded: "Stable version loaded.",
        statusNeedEmailPassword: "Enter email and password.",
        statusNeedEmail: "Enter email first.",
        statusLogin: "Logged in successfully.",
        statusCreate: "Account created successfully.",
        statusReset: "Password reset request saved.",
        statusLogout: "You are logged out."
      },
      ru: {
        brand: "AMAROSE Seller App",
        loginTitle: "Вход продавца",
        emailLabel: "Почта",
        passwordLabel: "Пароль",
        emailPlaceholder: "seller@amarose.com",
        passwordPlaceholder: "Введите пароль",
        loginBtn: "Войти",
        createBtn: "Создать аккаунт",
        resetBtn: "Сбросить пароль",
        demoTitle: "Демо доступ",
        demoText: "Можно войти с любой почтой и любым паролем. Данные сохраняются в браузере.",
        welcomeTitle: "Добро пожаловать",
        welcomeText: "Вы вошли в аккаунт.",
        logoutBtn: "Выйти",
        statusLoaded: "Стабильная версия загружена.",
        statusNeedEmailPassword: "Введите почту и пароль.",
        statusNeedEmail: "Сначала введите почту.",
        statusLogin: "Вход выполнен успешно.",
        statusCreate: "Аккаунт успешно создан.",
        statusReset: "Запрос на сброс пароля сохранён.",
        statusLogout: "Вы вышли из аккаунта."
      }
    };

    let state = {
      language: "en",
      loggedIn: false,
      email: ""
    };

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object") {
          state = { ...state, ...parsed };
        }
      } catch (e) {}
    }

    function tr(key) {
      const lang = state.language === "ru" ? "ru" : "en";
      return T[lang][key] || key;
    }

    function setStatus(text) {
      document.getElementById("status").innerText = text;
    }

    function applyLanguage() {
      document.documentElement.lang = state.language;

      document.getElementById("brand").innerText = tr("brand");
      document.getElementById("loginTitle").innerText = tr("loginTitle");
      document.getElementById("emailLabel").innerText = tr("emailLabel");
      document.getElementById("passwordLabel").innerText = tr("passwordLabel");
      document.getElementById("loginBtn").innerText = tr("loginBtn");
      document.getElementById("createBtn").innerText = tr("createBtn");
      document.getElementById("resetBtn").innerText = tr("resetBtn");
      document.getElementById("demoTitle").innerText = tr("demoTitle");
      document.getElementById("demoText").innerText = tr("demoText");
      document.getElementById("welcomeTitle").innerText = tr("welcomeTitle");
      document.getElementById("welcomeText").innerText = tr("welcomeText");
      document.getElementById("logoutBtn").innerText = tr("logoutBtn");

      document.getElementById("email").placeholder = tr("emailPlaceholder");
      document.getElementById("password").placeholder = tr("passwordPlaceholder");
      document.getElementById("langSelect").value = state.language;
    }

    function render() {
      applyLanguage();
      document.getElementById("email").value = state.email || "";

      if (state.loggedIn) {
        document.getElementById("authView").classList.add("hidden");
        document.getElementById("appView").classList.remove("hidden");
        setStatus(tr("statusLogin"));
      } else {
        document.getElementById("authView").classList.remove("hidden");
        document.getElementById("appView").classList.add("hidden");
        setStatus(tr("statusLoaded"));
      }
    }

    function loginNow() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setStatus(tr("statusNeedEmailPassword"));
        return;
      }

      state.loggedIn = true;
      state.email = email;
      saveState();
      render();
    }

    function createAccountNow() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setStatus(tr("statusNeedEmailPassword"));
        return;
      }

      state.loggedIn = true;
      state.email = email;
      saveState();
      render();
      setStatus(tr("statusCreate"));
    }

    function resetPasswordNow() {
      const email = document.getElementById("email").value.trim();

      if (!email) {
        setStatus(tr("statusNeedEmail"));
        return;
      }

      setStatus(tr("statusReset"));
    }

    function logoutNow() {
      state.loggedIn = false;
      saveState();
      render();
      setStatus(tr("statusLogout"));
    }

    function onLanguageChange(value) {
      state.language = value === "ru" ? "ru" : "en";
      saveState();
      applyLanguage();
      if (!state.loggedIn) {
        setStatus(tr("statusLoaded"));
      } else {
        setStatus(tr("statusLogin"));
      }
    }

    loadState();

    document.getElementById("langSelect").addEventListener("change", function(e) {
      onLanguageChange(e.target.value);
    });

    document.getElementById("loginBtn").addEventListener("click", loginNow);
    document.getElementById("createBtn").addEventListener("click", createAccountNow);
    document.getElementById("resetBtn").addEventListener("click", resetPasswordNow);
    document.getElementById("logoutBtn").addEventListener("click", logoutNow);

    render();
  </script>
</body>
  </html>
