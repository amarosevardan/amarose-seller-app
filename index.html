<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AMAROSE Button Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }
    select, input, button {
      width: 100%;
      font-size: 22px;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background: #175cd3;
      color: white;
      font-weight: bold;
      border: none;
    }
    #status {
      margin-top: 20px;
      padding: 16px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 14px;
      font-size: 24px;
      min-height: 60px;
    }
  </style>
</head>
<body>
  <h1 id="title">HELLO</h1>

  <select id="lang" onchange="
    localStorage.setItem('simple_lang_final', this.value);
    document.getElementById('title').innerText = this.value === 'ru' ? 'ПРИВЕТ' : 'HELLO';
    document.getElementById('loginBtn').innerText = this.value === 'ru' ? 'ВОЙТИ' : 'LOGIN';
    document.getElementById('createBtn').innerText = this.value === 'ru' ? 'СОЗДАТЬ АККАУНТ' : 'CREATE ACCOUNT';
    document.getElementById('resetBtn').innerText = this.value === 'ru' ? 'СБРОСИТЬ ПАРОЛЬ' : 'RESET PASSWORD';
    document.getElementById('status').innerText = this.value === 'ru' ? 'Язык переключён' : 'Language changed';
  ">
    <option value="en">English</option>
    <option value="ru">Русский</option>
  </select>

  <input id="email" type="text" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn" type="button" onclick="
    document.getElementById('status').innerText =
      document.getElementById('lang').value === 'ru'
      ? 'Кнопка ВОЙТИ работает'
      : 'LOGIN button works';
  ">LOGIN</button>

  <button id="createBtn" type="button" onclick="
    document.getElementById('status').innerText =
      document.getElementById('lang').value === 'ru'
      ? 'Кнопка СОЗДАТЬ АККАУНТ работает'
      : 'CREATE ACCOUNT button works';
  ">CREATE ACCOUNT</button>

  <button id="resetBtn" type="button" onclick="
    document.getElementById('status').innerText =
      document.getElementById('lang').value === 'ru'
      ? 'Кнопка СБРОСИТЬ ПАРОЛЬ работает'
      : 'RESET PASSWORD button works';
  ">RESET PASSWORD</button>

  <div id="status">Waiting...</div>

  <script>
    const saved = localStorage.getItem('simple_lang_final') || 'en';
    const lang = document.getElementById('lang');
    lang.value = saved;

    if (saved === 'ru') {
      document.getElementById('title').innerText = 'ПРИВЕТ';
      document.getElementById('loginBtn').innerText = 'ВОЙТИ';
      document.getElementById('createBtn').innerText = 'СОЗДАТЬ АККАУНТ';
      document.getElementById('resetBtn').innerText = 'СБРОСИТЬ ПАРОЛЬ';
      document.getElementById('status').innerText = 'Русский загружен';
    } else {
      document.getElementById('title').innerText = 'HELLO';
      document.getElementById('loginBtn').innerText = 'LOGIN';
      document.getElementById('createBtn').innerText = 'CREATE ACCOUNT';
      document.getElementById('resetBtn').innerText = 'RESET PASSWORD';
      document.getElementById('status').innerText = 'English loaded';
    }
  </script>
</body>
</html>
