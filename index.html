<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TEST</title>
</head>
<body style="font-family:Arial;padding:20px;">
  <h1 id="title">HELLO</h1>

  <select id="lang" onchange="setLang(this.value)" style="font-size:20px;padding:10px;">
    <option value="en">English</option>
    <option value="ru">Русский</option>
  </select>

  <br><br>

  <button onclick="testBtn()" style="font-size:20px;padding:12px 20px;">BUTTON TEST</button>

  <script>
    function setLang(lang) {
      localStorage.setItem('simple_lang', lang);

      if (lang === 'ru') {
        document.getElementById('title').innerText = 'ПРИВЕТ';
      } else {
        document.getElementById('title').innerText = 'HELLO';
      }

      document.getElementById('lang').value = lang;
    }

    function testBtn() {
      alert('BUTTON WORKS');
    }

    const saved = localStorage.getItem('simple_lang') || 'en';
    setLang(saved);
  </script>
</body>
</html>
