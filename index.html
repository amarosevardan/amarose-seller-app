  let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

  function mergeDeep(target, source) {
    const out = Array.isArray(target) ? [...target] : { ...target };
    if (!source || typeof source !== 'object') return out;
    Object.keys(source).forEach(key => {
      const srcVal = source[key];
      const tgtVal = out[key];
      if (Array.isArray(srcVal)) {
        out[key] = srcVal;
      } else if (srcVal && typeof srcVal === 'object') {
        out[key] = mergeDeep(
          tgtVal && typeof tgtVal === 'object' ? tgtVal : {},
          srcVal
        );
      } else {
        out[key] = srcVal;
      }
    });
    return out;
  }

  function safeState() {
    state = mergeDeep(DEFAULT_STATE, state || {});
    if (!Array.isArray(state.docs)) state.docs = [];
    if (!Array.isArray(state.messages)) state.messages = [];
    if (!Array.isArray(state.warnings)) state.warnings = [];
    if (!Array.isArray(state.activity)) state.activity = [];
    if (!state.profile || typeof state.profile !== 'object') {
      state.profile = JSON.parse(JSON.stringify(DEFAULT_STATE.profile));
    }
  }

  function saveState() {
    safeState();
    localStorage.setItem(KEY, JSON.stringify(state));
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) state = JSON.parse(raw);
    } catch (e) {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    safeState();
  }

  function nowText() {
    return new Date().toLocaleString();
  }

  function esc(str) {
    return String(str).replace(/[&<>"']/g, function(m) {
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
    });
  }

  function t(key) {
    safeState();
    const lang = I18N[state.language] ? state.language : 'en';
    return I18N[lang][key] || I18N.en[key] || key;
  }

  function addActivity(title, details) {
    safeState();
    state.activity.unshift({ title, details, time: nowText() });
    if (state.activity.length > 20) state.activity = state.activity.slice(0, 20);
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    if (!el) return;
    el.className = 'status';
    if (type === 'success') el.classList.add('success');
    if (type === 'info') el.classList.add('info');
    el.innerText = msg || '';
  }

  function getComplianceClass(val) {
    if (val === 'good_standing') return 'pill good';
    if (val === 'warning') return 'pill warning';
    if (val === 'restricted') return 'pill rejected';
    return 'pill pending';
  }

  function computeCompliance() {
    safeState();
    const rejectedCount = state.docs.filter(d => d.status === 'rejected').length;
    const warningCount = state.warnings.length;
    if (rejectedCount >= 2 || warningCount >= 2) return 'restricted';
    if (rejectedCount >= 1 || warningCount >= 1) return 'warning';
    return 'good_standing';
  }

  function randomDocStatus() {
    const r = Math.random();
    if (r < 0.45) return 'pending';
    if (r < 0.70) return 'approved';
    if (r < 0.90) return 'manual_review';
    return 'rejected';
  }

  function pillForDocStatus(status) {
    if (status === 'approved') return '<span class="pill approved">' + t('approved') + '</span>';
    if (status === 'rejected') return '<span class="pill rejected">' + t('rejected') + '</span>';
    if (status === 'manual_review') return '<span class="pill review">' + t('manual_review') + '</span>';
    return '<span class="pill pending">' + t('pending') + '</span>';
  }

  function renderReset() {
    const el = document.getElementById('resetBox');
    if (el) el.classList.toggle('hidden', !(state.resetShown && !state.loggedIn));
  }

  function renderProfile() {
    safeState();
    state.compliance = computeCompliance();

    const byId = id => document.getElementById(id);

    if (byId('viewEmail')) byId('viewEmail').innerText = state.email || '-';
    if (byId('viewRole')) byId('viewRole').innerText = t('sellerWord');
    if (byId('viewTariff')) byId('viewTariff').innerText = state.tariff;
    if (byId('viewCurrency')) byId('viewCurrency').innerText = state.profile.currency || 'EUR';

    const ver = state.docs.length ? state.docs[0].status : 'pending';
    const verEl = byId('viewVerification');
    if (verEl) {
      verEl.className = 'pill pending';
      if (ver === 'approved') verEl.className = 'pill approved';
      if (ver === 'rejected') verEl.className = 'pill rejected';
      if (ver === 'manual_review') verEl.className = 'pill review';
      verEl.innerText = t(ver);
    }

    const compEl = byId('viewCompliance');
    if (compEl) {
      compEl.className = getComplianceClass(state.compliance);
      compEl.innerText = t(state.compliance);
    }

    if (byId('statDocsValue')) byId('statDocsValue').innerText = String(state.docs.length);
    if (byId('statWarningsValue')) byId('statWarningsValue').innerText = String(state.warnings.length);
    if (byId('statMessagesValue')) byId('statMessagesValue').innerText = String(state.messages.length);
    if (byId('statReviewsValue2')) byId('statReviewsValue2').innerText = String(state.docs.filter(d => d.status === 'manual_review').length);

    if (byId('fullNameInput')) byId('fullNameInput').value = state.profile.fullName || '';
    if (byId('companyInput')) byId('companyInput').value = state.profile.company || '';
    if (byId('sellerTypeInput')) byId('sellerTypeInput').value = state.profile.sellerType || 'individual';
    if (byId('phoneInput')) byId('phoneInput').value = state.profile.phone || '';
    if (byId('countryInput')) byId('countryInput').value = state.profile.country || '';
    if (byId('cityInput')) byId('cityInput').value = state.profile.city || '';
    if (byId('profileLanguageInput')) byId('profileLanguageInput').value = state.profile.profileLanguage || state.language || 'en';
    if (byId('currencyInput')) byId('currencyInput').value = state.profile.currency || 'EUR';
  }

  function renderWarnings() {
    const wrap = document.getElementById('warningHistory');
    if (!wrap) return;
    if (!state.warnings.length) {
      wrap.innerHTML = '<div class="small">' + t('noWarnings') + '</div>';
      return;
    }
    wrap.innerHTML = state.warnings.map(function(w) {
      return `
        <div class="historyItem">
          <div class="topLine">
            <div class="historyTitle">${esc(w.title)}</div>
            <span class="pill warning">${t('warning')}</span>
          </div>
          <div class="historyMeta">${esc(w.text)}</div>
          <div class="historyMeta">${esc(w.time)}</div>
        </div>
      `;
    }).join('');
  }

  function renderDocs() {
    const wrap = document.getElementById('docList');
    if (!wrap) return;
    if (!state.docs.length) {
      wrap.innerHTML = '<div class="small">' + t('noDocs') + '</div>';
      return;
    }
    wrap.innerHTML = state.docs.map(function(d, i) {
      return `
        <div class="card">
          <div class="topLine">
            <div>
              <div class="cardTitle">${esc(d.name)}</div>
              <div class="docMeta">${esc(d.type)}</div>
            </div>
            ${pillForDocStatus(d.status)}
          </div>
          <div class="docMeta">${esc(d.comment || '')}</div>
          <div class="docMeta">${esc(d.time || '')}</div>
          <button type="button" class="danger" onclick="deleteDoc(${i})">${t('deleteBtn')}</button>
        </div>
      `;
    }).join('');
  }

  function renderMessages() {
    const wrap = document.getElementById('messageHistory');
    if (!wrap) return;
    if (!state.messages.length) {
      wrap.innerHTML = '<div class="small">' + t('noMessages') + '</div>';
      return;
    }
    wrap.innerHTML = state.messages.map(function(m) {
      return `
        <div class="card">
          <div class="topLine">
            <div class="cardTitle">${esc(m.subject)}</div>

          <div class="docMeta">${esc(m.time)}</div>
        </div>

  }

      wrap.innerHTML = '<div class="small">' + t('noHistory') + '</div>';
      return;
    }
    wrap.innerHTML = state.activity.map(function(a) {
      return `
        <div class="historyItem">

        </div>
      `;
    }).join('');
  }

  function showScreen(name) {
    safeState();
    state.activeScreen = name;
    saveState();

    const screens = ['screenProfile','screenDocuments','screenTariffs','screenStats','screenMessages'];
    screens.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    });

    const navs = ['navProfile','navDocuments','navTariffs','navStats'];
    navs.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });

    if (name === 'profile') {
      document.getElementById('screenProfile').classList.remove('hidden');
      document.getElementById('navProfile').classList.add('active');
    }
    if (name === 'documents') {
      document.getElementById('screenDocuments').classList.remove('hidden');
      document.getElementById('navDocuments').classList.add('active');
    }
    if (name === 'tariffs') {
      document.getElementById('screenTariffs').classList.remove('hidden');
      document.getElementById('navTariffs').classList.add('active');
    }
    if (name === 'stats') {
      document.getElementById('screenStats').classList.remove('hidden');
      document.getElementById('navStats').classList.add('active');
    }
    if (name === 'messages') {
      document.getElementById('screenMessages').classList.remove('hidden');
    }
  }

  function loginNow() {
    const email = (document.getElementById('emailInput')?.value || '').trim();
    const password = (document.getElementById('passwordInput')?.value || '').trim();
    if (!email || !password) {
      setStatus(t('needBoth'));
      return;
    }
    state.loggedIn = true;
    state.email = email;
    state.resetShown = false;
    addActivity(t('loginAction'), email);
    saveState();
    render();
    setStatus(t('loginOk'), 'success');
  }

  function createNow() {
    const email = (document.getElementById('emailInput')?.value || '').trim();
    const password = (document.getElementById('passwordInput')?.value || '').trim();
    if (!email || !password) {
      setStatus(t('needBoth'));
      return;
    }
    state.loggedIn = true;
    state.email = email;
    state.resetShown = false;
    addActivity(t('accountCreated'), email);
    saveState();
    render();
    setStatus(t('createOk'), 'success');
  }

  function resetNow() {
    const email = (document.getElementById('emailInput')?.value || '').trim();
    if (!email) {
      setStatus(t('needEmail'));
      return;
    }
    state.loggedIn = false;
    state.email = email;
    state.resetShown = true;
    addActivity(t('passwordReset'), email);
    saveState();
    render();
    setStatus(t('resetOk'), 'success');
  }

  function logoutNow() {
    if (!confirm(t('logoutAsk'))) return;
    state.loggedIn = false;
    state.resetShown = false;
    saveState();
    render();
    setStatus(t('logoutOk'), 'info');
  }

  function saveProfileNow() {
    state.profile.fullName = (document.getElementById('fullNameInput')?.value || '').trim();
    state.profile.company = (document.getElementById('companyInput')?.value || '').trim();
    state.profile.sellerType = document.getElementById('sellerTypeInput')?.value || 'individual';
    state.profile.phone = (document.getElementById('phoneInput')?.value || '').trim();
    state.profile.country = (document.getElementById('countryInput')?.value || '').trim();
    state.profile.city = (document.getElementById('cityInput')?.value || '').trim();
    state.profile.profileLanguage = document.getElementById('profileLanguageInput')?.value || state.language;
    state.profile.currency = document.getElementById('currencyInput')?.value || 'EUR';
    addActivity(t('profileSaved'), state.profile.fullName || state.email || '');
    saveState();
    renderProfile();
    renderActivity();
    setStatus(t('profileOk'), 'success');
  }

  function addDocNow() {
    const name = (document.getElementById('docNameInput')?.value || '').trim();
    const type = document.getElementById('docTypeInput')?.value || 'Passport';
    const comment = (document.getElementById('docCommentInput')?.value || '').trim();

    if (!name) {
      setStatus(t('docNameLabel'));
      return;
    }

    const status = randomDocStatus();
    const doc = { name, type, comment, status, time: nowText() };
    state.docs.unshift(doc);

    if (status === 'rejected') {
      state.warnings.unshift({
        title: name,
        text: 'Document was rejected during verification.',
        time: nowText()
      });
    }

    if (document.getElementById('docNameInput')) document.getElementById('docNameInput').value = '';
    if (document.getElementById('docCommentInput')) document.getElementById('docCommentInput').value = '';

    addActivity(t('docUploaded'), name + ' / ' + t(status));
    saveState();
    render();
    showScreen('documents');
    setStatus(t('docOk'), 'success');
  }

  function deleteDoc(index) {
    const removed = state.docs[index];
    state.docs.splice(index, 1);
    addActivity(t('docDeleted'), removed ? removed.name : '');
    saveState();
    render();
    showScreen('documents');
    setStatus(t('docDeleteOk'), 'info');
  }

  function buyTariffNow(plan, duration) {
    state.tariff = plan + ' - ' + duration;
    addActivity(t('tariffChanged'), state.tariff);
    saveState();
    renderProfile();
    renderActivity();
    setStatus(t('tariffOk'), 'success');
  }

  function openMessageCenter() {
    showScreen('messages');
    renderMessages();
    setStatus(t('messagesTitle'), 'info');
  }

  function backToProfile() {
    showScreen('profile');
  }

  function sendMessageNow() {
    const type = document.getElementById('messageTypeInput')?.value || 'support';
    const subject = (document.getElementById('messageSubjectInput')?.value || '').trim();
    const text = (document.getElementById('messageTextInput')?.value || '').trim();

    if (!subject || !text) {
      setStatus(t('messageNeed'));
      return;
    }

    state.messages.unshift({ type, subject, text, time: nowText() });

    if (type === 'problem_report') {
      state.warnings.unshift({
        title: subject,
        text: 'Problem reported and sent to support.',
        time: nowText()
      });
    }

    if (document.getElementById('messageSubjectInput')) document.getElementById('messageSubjectInput').value = '';
    if (document.getElementById('messageTextInput')) document.getElementById('messageTextInput').value = '';

    addActivity(t('messageSent'), subject + ' / ' + t(type));
    saveState();
    render();
    showScreen('messages');
    setStatus(t('messageOk'), 'success');
  }

  function changeLanguage(lang) {
    state.language = I18N[lang] ? lang : 'en';
    saveState();
    render();
  }

  function render() {
    try {
      safeState();
      applyTranslations();
      renderReset();
      renderProfile();
      renderWarnings();
      renderDocs();
      renderMessages();
      renderActivity();

      const authView = document.getElementById('authView');
      const appView = document.getElementById('appView');
      const bottomNav = document.getElementById('bottomNav');

      if (authView) authView.classList.toggle('hidden', state.loggedIn);
      if (appView) appView.classList.toggle('hidden', !state.loggedIn);
      if (bottomNav) bottomNav.classList.toggle('hidden', !state.loggedIn);

      if (state.loggedIn) {
        showScreen(state.activeScreen || 'profile');
      }

      if (state.loggedIn) setStatus(t('loginOk'));
      else if (state.resetShown) setStatus(t('resetOk'));
      else setStatus(t('loaded'), 'info');
    } catch (e) {
      console.error(e);
      setStatus('JS error fixed mode: reload page once.', 'info');
    }
  }

  loadState();
  render();
</script>
