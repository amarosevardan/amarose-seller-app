<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AMAROSE Seller App Mini V2</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #101828;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f5f7fb;
    }
    .topbar {
      background: #175cd3;
      color: #fff;
      padding: 18px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .brand {
      font-size: 17px;
      font-weight: 800;
    }
    .lang {
      width: 150px;
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: #101828;
    }
    .status {
      margin: 16px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #fedf89;
      background: #fffaeb;
      color: #b54708;
      min-height: 48px;
      font-size: 14px;
    }
    .content {
      padding: 16px;
    }
    .box {
      background: #fff;
      border: 1px solid #d0d5dd;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 20px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 800;
    }
    .label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #344054;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      font-size: 16px;
      margin-bottom: 12px;
      background: #fff;
      color: #101828;
    }
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .primary { background: #175cd3; color: #fff; }
    .secondary { background: #e8eefc; color: #175cd3; }
    .danger { background: #fee4e2; color: #b42318; }
    .hidden { display: none !important; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #eaecf0;
      font-size: 14px;
    }
    .row:last-child { border-bottom: none; }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #fffaeb;
      color: #b54708;
    }
    .small {
      color: #667085;
      font-size: 14px;
      line-height: 1.5;
    }
    .successbox {
      background: #ecfdf3;
      border: 1px solid #abefc6;
      color: #067647;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand" id="brand">AMAROSE Seller App</div>
      <select id="langSelect" class="lang" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="ru">Русский</option>
      </select>
    </div>

    <div id="status" class="status"></div>

    <div id="authView" class="content">
      <h1 id="loginTitle">Seller Login</h1>

      <div class="box">
        <label class="label" id="emailLabel">Email</label>
        <input id="email" type="email" placeholder="seller@amarose.com">

        <label class="label" id="passwordLabel">Password</label>
        <input id="password" type="password" placeholder="Enter password">

        <button id="loginBtn" class="primary" type="button" onclick="loginNow()">Login</button>
        <button id="createBtn" class="secondary" type="button" onclick="createAccountNow()">Create account</button>
        <button id="resetBtn" class="secondary" type="button" onclick="resetPasswordNow()">Reset password</button>
      </div>

      <div id="resetResult" class="box hidden">
        <h2 id="resetTitle">Password reset</h2>
        <div id="resetMessage" class="successbox">Reset request created.</div>
      </div>

      <div class="box">
        <h2 id="demoTitle">Demo access</h2>
        <div id="demoText" class="small">You can login with any email and any password. Data is saved in this browser.</div>
      </div>
    </div>

    <div id="appView" class="content hidden">
      <div class="box">
        <h2 id="insideTitle">Seller App</h2>
        <div class="row"><strong id="ovEmail">Email</strong><span id="viewEmail">-</span></div>
        <div class="row"><strong id="ovRole">Role</strong><span id="viewRole">seller</span></div>
        <div class="row"><strong id="ovStatus">Status</strong><span id="viewStatus">active</span></div>
        <div class="row"><strong id="ovVerification">Verification</strong><span class="pill" id="viewVerification">pending</span></div>
      </div>

      <div class="box">
        <button id="logoutBtn" class="danger" type="button" onclick="logoutNow()">Logout</button>
      </div>
    </div>
  </div>

  <script>
    const KEY = 'amarose_seller_mini_v2';

    const T = {
      en: {
        brand: 'AMAROSE Seller App',
        loginTitle: 'Seller Login',
        emailLabel: 'Email',
        passwordLabel: 'Password',
        emailPlaceholder: 'seller@amarose.com',
        passwordPlaceholder: 'Enter password',
        loginBtn: 'Login',
        createBtn: 'Create account',
        resetBtn: 'Reset password',
        demoTitle: 'Demo access',
        demoText: 'You can login with any email and any password. Data is saved in this browser.',
        insideTitle: 'Seller App',
        ovEmail: 'Email',
        ovRole: 'Role',
        ovStatus: 'Status',
        ovVerification: 'Verification',
        logoutBtn: 'Logout',
        resetTitle: 'Password reset',
        resetMessage: 'Reset request created successfully.',
        statusLoaded: 'Application loaded successfully.',
        statusNeedEmail: 'Enter email first.',
        statusNeedEmailPassword: 'Enter email and password.',
        statusLogin: 'Logged in successfully.',
        statusCreate: 'Account created successfully.',
        statusReset: 'Password reset request created.',
        statusLogout: 'Logged out successfully.'
      },
      ru: {
        brand: 'AMAROSE Seller App',
        loginTitle: 'Вход продавца',
        emailLabel: 'Почта',
        passwordLabel: 'Пароль',
        emailPlaceholder: 'seller@amarose.com',
        passwordPlaceholder: 'Введите пароль',
        loginBtn: 'Войти',
        createBtn: 'Создать аккаунт',
        resetBtn: 'Сбросить пароль',
        demoTitle: 'Демо доступ',
        demoText: 'Можно войти с любой почтой и любым паролем. Данные сохраняются в браузере.',
        insideTitle: 'Seller App',
        ovEmail: 'Почта',
        ovRole: 'Роль',
        ovStatus: 'Статус',
        ovVerification: 'Проверка',
        logoutBtn: 'Выйти',
        resetTitle: 'Сброс пароля',
        resetMessage: 'Запрос на сброс пароля успешно создан.',
        statusLoaded: 'Приложение загружено.',
        statusNeedEmail: 'Сначала введите почту.',
        statusNeedEmailPassword: 'Введите почту и пароль.',
        statusLogin: 'Вход выполнен успешно.',
        statusCreate: 'Аккаунт успешно создан.',
        statusReset: 'Запрос на сброс пароля создан.',
        statusLogout: 'Вы вышли из аккаунта.'
      }
    };

    let state = {
      language: 'en',
      loggedIn: false,
      email: '',
      resetShown: false
    };

    function saveState() {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed) state = parsed;
      } catch (e) {}
    }

    function tr(key) {
      const lang = state.language === 'ru' ? 'ru' : 'en';
      return T[lang][key] || key;
    }

    function setStatus(text) {
      document.getElementById('status').innerText = text;
    }

    function applyLanguage() {
      document.getElementById('brand').innerText = tr('brand');
      document.getElementById('loginTitle').innerText = tr('loginTitle');
      document.getElementById('emailLabel').innerText = tr('emailLabel');
      document.getElementById('passwordLabel').innerText = tr('passwordLabel');
      document.getElementById('loginBtn').innerText = tr('loginBtn');
      document.getElementById('createBtn').innerText = tr('createBtn');
      document.getElementById('resetBtn').innerText = tr('resetBtn');
      document.getElementById('demoTitle').innerText = tr('demoTitle');
      document.getElementById('demoText').innerText = tr('demoText');
      document.getElementById('insideTitle').innerText = tr('insideTitle');
      document.getElementById('ovEmail').innerText = tr('ovEmail');
      document.getElementById('ovRole').innerText = tr('ovRole');
      document.getElementById('ovStatus').innerText = tr('ovStatus');
      document.getElementById('ovVerification').innerText = tr('ovVerification');
      document.getElementById('logoutBtn').innerText = tr('logoutBtn');
      document.getElementById('resetTitle').innerText = tr('resetTitle');
      document.getElementById('resetMessage').innerText = tr('resetMessage');

      document.getElementById('email').placeholder = tr('emailPlaceholder');
      document.getElementById('password').placeholder = tr('passwordPlaceholder');
      document.getElementById('langSelect').value = state.language;
    }

    function showAuth() {
      document.getElementById('authView').classList.remove('hidden');
      document.getElementById('appView').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
    }

    function renderResetBox() {
      const box = document.getElementById('resetResult');
      if (state.resetShown && !state.loggedIn) {
        box.classList.remove('hidden');
      } else {
        box.classList.add('hidden');
      }
    }

    function render() {
      applyLanguage();
      document.getElementById('viewEmail').innerText = state.email || '-';
      renderResetBox();

      if (state.loggedIn) {
        showApp();
        setStatus(tr('statusLogin'));
      } else {
        showAuth();
        if (state.resetShown) {
          setStatus(tr('statusReset'));
        } else {
          setStatus(tr('statusLoaded'));
        }
      }
    }

    function changeLanguage(lang) {
      state.language = lang === 'ru' ? 'ru' : 'en';
      saveState();
      render();
    }

    function loginNow() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        setStatus(tr('statusNeedEmailPassword'));
        return;
      }

      state.loggedIn = true;
      state.email = email;
      state.resetShown = false;
      saveState();
      showApp();
      applyLanguage();
      document.getElementById('viewEmail').innerText = state.email;
      setStatus(tr('statusLogin'));
    }

    function createAccountNow() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        setStatus(tr('statusNeedEmailPassword'));
        return;
      }

      state.loggedIn = true;
      state.email = email;
      state.resetShown = false;
      saveState();
      showApp();
      applyLanguage();
      document.getElementById('viewEmail').innerText = state.email;
      setStatus(tr('statusCreate'));
    }

    function resetPasswordNow() {
      const email = document.getElementById('email').value.trim();

      if (!email) {
        setStatus(tr('statusNeedEmail'));
        return;
      }

      state.loggedIn = false;
      state.resetShown = true;
      state.email = email;
      saveState();
      showAuth();
      renderResetBox();
      setStatus(tr('statusReset'));
    }

    function logoutNow() {
      state.loggedIn = false;
      state.resetShown = false;
      saveState();
      showAuth();
      renderResetBox();
      applyLanguage();
      setStatus(tr('statusLogout'));
    }

    loadState();
    render();
  </script>
</body>
</html>
