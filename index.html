<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMAROSE NEW TEST</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border: 1px solid #d0d5dd;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #175cd3;
    }
    p {
      margin: 0 0 18px;
      color: #475467;
      font-size: 16px;
    }
    button {
      border: none;
      background: #175cd3;
      color: white;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    #status {
      margin-top: 16px;
      font-weight: 700;
      color: #027a48;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AMAROSE</h1>
    <p>New test page is working</p>
    <button id="btn" type="button">Press me</button>
    <div id="status">Loaded</div>
  </div>

  <script>
    document.getElementById('btn').onclick = function () {
      document.getElementById('status').textContent = 'Button works';
      alert('Button works');
    };
  </script>
</body>
</html>
